<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <div class="p-7 h-screen flex items-center justify-center ">
        <div class=" w-[40%] h-[98%] bg-[#ffffff] ">
            <div class=" w-full   ">
                <div class="px-16 py-8">
                    <h1 class="text-4xl font-bold mb-4 ">Create User</h1>
                    <p class="text-gray-600 text-xl mb-8">Please fill in the form to create a new user.</p>
                </div>
                <div>
                    <img src="https://i.pinimg.com/736x/2e/94/8e/2e948e58a56b811b7d56128e74fe6b83.jpg"
                        class=" w-full h-[31rem] object-contain" alt="img">
                </div>
            </div>
        </div>
        <div class="flex px-8 py-8 justify-center w-[40%] h-[98%] bg-[#f5f5f5]">
            <form id="userForm" method="post">
                <h3 class="text-lg font-medium mb-2 ">What's your name?</h3>
                <input type="text" id="username" username="username"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base "
                    placeholder="Username">
                <h3 class="text-lg font-medium mb-2 ">What's your email?</h3>
                <input type="email" id="email" name="email"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base "
                    placeholder="Email">
                <h3 class="text-lg font-medium mb-2 ">Password?</h3>
                <input type="password" id="password" name="password"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base "
                    placeholder="Password">
                <h3 class="text-lg font-medium mb-2 ">Role</h3>
                <select id="role" name="role"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base ">
                    <option value="">Select Role</option>
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <h3 class="text-lg font-medium mb-2 ">About You</h3>
                <textarea id="bio" name="bio"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base "
                    placeholder="Tell us about yourself"></textarea>
                <h3 class="text-lg font-medium mb-2 ">Create Data</h3>
                <input type="date" id="releaseDate"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full text-lg placeholder:text-base ">
                <h3 class="text-lg font-medium mb-2 ">Upload your image</h3>
                <input type="file" id="imageFile" name="imageFile"
                    class="bg-[#eee] mb-4 rounded px-2 py-1 border w-full rounded-full px-4 py-2 text-lg placeholder:text-base ">



                <p id="status" class="text-center mt-1/2 font-semibold"></p>

                <div class="flex justify-between ">
                    <button type="submit" class="px-4 py-2 w-38 bg-black text-white rounded">
                        Submit
                    </button>

                    <button type="button" onclick="cancelForm()" class="px-4 py-2 w-38 bg-red-500 text-white rounded">
                        Cancel
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script src="js/user-form.js"></script>

</body>

</html>
